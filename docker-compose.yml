version: "3.9"

# Two deployable services: `voice` (STT/LLM/TTS + static demo) and `interview` (control-plane API, scaffold).
services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  voice:
    build:
      context: .
      dockerfile: services/voice/Dockerfile
    ports:
      - "8081:8080"   # static demo (host:container); 8080 often busy on the host
      - "8765:8765"   # WebSocket
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=cpu
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5}
      - BOT_SYSTEM_PROMPT=${BOT_SYSTEM_PROMPT:-You are a helpful concise voice assistant.}
    restart: unless-stopped
    volumes:
      - whisper-cache:/root/.cache/huggingface

  interview:
    build:
      context: .
      dockerfile: services/interview/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Browser-facing hints when opening /docs on the host; must match host port mapping for `voice`
      - VOICE_WS_PUBLIC_URL=ws://localhost:8765
      - VOICE_HTTP_PUBLIC_URL=http://localhost:8081
      - DATABASE_URL=postgresql+psycopg://crm_user:crm_pass@postgres:5432/crm_db
      - REDIS_URL=redis://redis:6379/0
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-this-webhook-secret}
      - JWT_SECRET=${JWT_SECRET:-change-this-jwt-secret}
      - CRM_ADMIN_USERNAME=${CRM_ADMIN_USERNAME:-admin}
      - CRM_ADMIN_PASSWORD=${CRM_ADMIN_PASSWORD:-admin123}
    depends_on:
      - voice
      - postgres
      - redis
    restart: unless-stopped

  interview-worker:
    build:
      context: .
      dockerfile: services/interview/Dockerfile
    command: celery -A app.worker.celery_app.celery_app worker -Q crm_automations --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg://crm_user:crm_pass@postgres:5432/crm_db
      - REDIS_URL=redis://redis:6379/0
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-meta}
      - SMS_PROVIDER=${SMS_PROVIDER:-twilio}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-ses}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
    depends_on:
      - interview
      - postgres
      - redis
    restart: unless-stopped

volumes:
  whisper-cache:
  postgres-data:
